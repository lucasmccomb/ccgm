name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Validate modules
        run: bash tests/test-modules.sh

      - name: Check personal data
        run: bash tests/test-no-personal-data.sh

      - name: Test templates
        run: bash tests/test-templates.sh

      - name: Test installer (minimal)
        run: bash tests/test-installer.sh

      - name: Test link mode
        run: bash tests/test-link-mode.sh

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: brew install jq

      - name: Validate modules
        run: bash tests/test-modules.sh

      - name: Check personal data
        run: bash tests/test-no-personal-data.sh

      - name: Test templates
        run: bash tests/test-templates.sh

      - name: Test installer (minimal)
        run: bash tests/test-installer.sh

      - name: Test link mode
        run: bash tests/test-link-mode.sh
